<!-- ЭТАП 2: КРАСНЫЙ НА ЧЕРНОМ (ХАКЕР + РОДИТЕЛИ) -->
    <div id="box2" class="stage2">
        <img src="https://i.imgur.com" class="mask">
        <h1 style="letter-spacing: 5px;">ВЗЛОМ ВЕЗДЕ</h1>
        <div id="timer2">05:00:00</div>
        <h2 style="background: red; color: black; padding: 5px;">ПРОВЕРКА ВАШИХ ДАННЫХ...</h2>
        <p style="font-weight: bold; padding: 0 20px; font-size: 1.1rem;">
            ПРИ ПОПЫТКЕ ВЫКЛЮЧИТЬ ТЕЛЕФОН ИЛИ ЗАКРЫТЬ ВКЛАДКУ — ВСЕ ВАШИ ДАННЫЕ БУДУТ ПЕРЕСЛАНЫ ВАШИМ РОДИТЕЛЯМ И ХАКЕРУ!
        </p>
        <p style="color: white; margin-top: 10px;">ХАКЕР БУДЕТ ИСПОЛЬЗОВАТЬ ВАШ ТЕЛЕФОН!</p>
        <p style="font-weight: bold; margin-top: 15px;">ВНИМАНИЕ! СПОКОЙСТВИЕ! СИСТЕМА ANDROID/IPHONE/ПК ДЕЛАЕТ ВСЕ ЧТО МОЖНО.</p>
    </div>

    <audio id="alarm" loop>
        <source src="https://www.soundjay.com" type="audio/mpeg">
    </audio>

    <script>
        let stage = 1;
        let timeLeft = 5 * 60 * 60; 
        let running = false;

        function formatTime(s) {
            let h = Math.floor(s / 3600);
            let m = Math.floor((s % 3600) / 60);
            let sec = s % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function initTroll() {
            if (running) return;
            running = true;

            // Запрос полного экрана
            let el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();

            setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    if (stage === 1) {
                        document.getElementById('timer').innerText = formatTime(timeLeft);
                    } else {
                        document.getElementById('timer2').innerText = formatTime(timeLeft);
                    }
                } else {
                    if (stage === 1) {
                        stage = 2;
                        timeLeft = 5 * 60 * 60; // Сброс на вторые 5 часов
                        startStage2();
                    } else {
                        window.location.href = "https://google.com";
                    }
                }
            }, 1000);
        }

        function startStage2() {
            document.getElementById('box1').style.display = 'none';
            const box2 = document.getElementById('box2');
            box2.style.display = 'flex';
            
            // Запуск звука
            let audio = document.getElementById('alarm');
            audio.play().catch(e => console.log("Нужен клик для звука"));

            // Спам надписей "ВЗЛОМ"
            for(let i=0; i<80; i++) {
                let txt = document.createElement('div');
                txt.className = 'hacked-label';
                txt.innerText = 'ВЗЛОМ';
                txt.style.left = Math.random() * 95 + '%';
                txt.style.top = Math.random() * 95 + '%';
                txt.style.transform = `rotate(${Math.random() * 360}deg)`;
                box2.appendChild(txt);
            }
        }

        window.onbeforeunload = function() {
            return "ДАННЫЕ БУДУТ ПЕРЕДАНЫ ХАКЕРУ И РОДИТЕЛЯМ!";
        };
    </script>
</body>
</html>
